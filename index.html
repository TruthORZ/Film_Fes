<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>电影节名称 | Film Festival</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .hero-bg {
            background-image: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('https://images.unsplash.com/photo-1485846234645-a62644f84728?auto=format&fit=crop&w=1920&q=80');
            background-size: cover;
            background-position: center;
        }
    </style>
</head>
<body class="bg-black text-white font-sans">

    <header class="hero-bg h-screen flex flex-col justify-center items-center text-center px-4">
        <h1 class="text-6xl md:text-8xl font-bold mb-4 tracking-tighter">电影节标题</h1>
        <p class="text-xl md:text-2xl text-gray-300 italic mb-8">“这里是一句震撼人心的 Tagline”</p>
        <div class="max-w-2xl bg-black/40 p-6 rounded-lg backdrop-blur-sm">
            <p class="text-lg leading-relaxed">
                这里是引入文案。面对纷繁的世界，我们为何需要电影？<br>
                简要回答：为了看见未曾抵达的远方。<br>
                <strong>本次电影节目的：</strong> 链接独立影像与大众。
            </p>
        </div>
    </header>

    <section class="py-20 px-4 max-w-6xl mx-auto">
        <h2 class="text-4xl font-bold mb-12 text-center border-b border-gray-800 pb-4">入选影片 / Selections</h2>
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-10">
            <div class="group">
                <div class="overflow-hidden rounded-lg bg-gray-900 aspect-[2/3] mb-4">
                    <img src="https://via.placeholder.com/400x600" alt="电影海报" class="w-full h-full object-cover group-hover:scale-105 transition duration-500">
                </div>
                <h3 class="text-2xl font-bold mb-2">电影名称 01</h3>
                <p class="text-gray-400 text-sm leading-relaxed">这里是关于这部电影的简要介绍，描述它的风格、导演以及它为何触动人心。</p>
            </div>
            </div>
    </section>

    <section class="py-20 bg-zinc-900">
        <div class="max-w-4xl mx-auto px-4">
            <h2 class="text-4xl font-bold mb-10 text-center">预告片 / Trailer</h2>
            <div class="aspect-video rounded-xl overflow-hidden shadow-2xl">
                <iframe class="w-full h-full" src="https://www.youtube.com/embed/dQw4w9WgXcQ" frameborder="0" allowfullscreen></iframe>
            </div>
        </div>
    </section>

    <footer class="py-10 text-center text-gray-500 text-sm">
        &copy; 2026 电影节组织委员会. All Rights Reserved.
    </footer>

</body>
</html>
