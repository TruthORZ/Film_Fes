<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Sci-fi Film Festival</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .hero-bg {
            background-image: url('bg.png');
            background-size: cover;
            background-position: center;
        }
        .intro-bg {
            background-image: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)), url('intro-bg.jpg'); /* 你可以上传一张新图叫 intro-bg.jpg */
            background-size: cover;
            background-position: center;
        }
    </style>
</head>
<body class="bg-black text-white font-sans">

    <header class="hero-bg h-[70vh] flex flex-col justify-center items-center text-center px-4">
        <h1 class="text-6xl md:text-8xl font-bold mb-4 tracking-tighter text-white" style="text-shadow: 6px 6px 0px #FFDC33;">Sci-fi Film Festival: Everyone is a Universe</h1>
        <p class="text-xl md:text-2xl text-gray-300 italic">"We look to the stars, only to find ourselves."</p>
    </header>
    
    <section class="intro-bg py-24 px-4 border-y border-zinc-800">
        <div class="max-w-3xl mx-auto text-center">
            <h2 class="text-yellow-400 text-sm tracking-[0.2em] uppercase mb-6">关于电影节 / About</h2>
            <div class="text-xl md:text-2xl leading-relaxed text-gray-100 space-y-6">
                <p>面对纷繁的世界，我们为何需要电影？</p>
                <p class="text-gray-400 text-lg">简要回答：为了看见未曾抵达的远方。</p>
                <p class="pt-4 font-light italic border-t border-zinc-700 w-1/2 mx-auto">
                    <strong>本次电影节目的：</strong><br>
                    链接独立影像与大众，在光影中寻找共鸣。
                </p>
            </div>
        </div>
    </section>

    <section class="py-20 px-4 max-w-6xl mx-auto">
        <h2 class="text-4xl font-bold mb-12 text-center border-b border-gray-800 pb-4">Selections</h2>
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-10">
            <div class="group">
                <div class="overflow-hidden rounded-lg bg-gray-900 aspect-[2/3] mb-4">
                    <img src="https://via.placeholder.com/400x600" alt="电影海报" class="w-full h-full object-cover group-hover:scale-105 transition duration-500">
                </div>
                <h3 class="text-2xl font-bold mb-2">电影名称 01</h3>
                <p class="text-gray-400 text-sm leading-relaxed">这里是关于这部电影的简要介绍，描述它的风格、导演以及它为何触动人心。</p>
            </div>
            </div>
    </section>

    <section class="py-20 bg-zinc-900">
        <div class="max-w-4xl mx-auto px-4">
            <h2 class="text-4xl font-bold mb-10 text-center">Trailer</h2>
            <div class="aspect-video rounded-xl overflow-hidden shadow-2xl">
                <iframe class="w-full h-full" src="https://www.youtube.com/embed/dQw4w9WgXcQ" frameborder="0" allowfullscreen></iframe>
            </div>
        </div>
    </section>

    <footer class="py-10 text-center text-gray-500 text-sm">
        &copy; 2026 CHAORAN XIA. All Rights Reserved.
    </footer>

</body>
</html>
